name: Deploy Multi-Cloud API (AWS & Azure)

on:
  push:
    branches: [ main ]

jobs:
  # JOB 1: AWS (Linux + Nginx)
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build and Run on AWS
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        run: |
          # 1. Build da nova imagem
          docker build -t checkvisit-api .
          
          # 2. Para e remove o container antigo (se existir)
          docker stop checkvisit-container || true
          docker rm checkvisit-container || true
          
          # 3. Roda o novo container na porta 5000 (para o Nginx fazer o Proxy)
          # Usamos a variável de ambiente conforme o padrăo do .NET 8
          docker run -d \
            --name checkvisit-container \
            --restart always \
            -p 5000:8080 \
            -e ConnectionStrings__DefaultConnection="$DB_CONN" \
            -e ASPNETCORE_URLS="http://+:8080" \
            checkvisit-api
            
          # 4. Limpeza de imagens "soltas" para economizar espaço
          docker image prune -f

  # JOB 2: AZURE (Windows / PowerShell)
  deploy-azure:
    name: Deploy to Azure VM
    runs-on: azure-vm
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build and Run on Azure
        env:
          DB_CONN: ${{ secrets.DB_CONNECTION_STRING }}
        shell: powershell
        run: |
          docker build -t checkvisit-api .
          
          $container = docker ps -a -q -f "name=checkvisit-container-azure"
          if ($container) { 
              docker stop checkvisit-container-azure
              docker rm checkvisit-container-azure 
          }
          
          docker run -d `
            --name checkvisit-container-azure `
            --restart always `
            -p 8080:8080 `
            -p 443:443 `
            -v C:\certs:/app/certs `
            -e ConnectionStrings__DefaultConnection="$($env:DB_CONN)" `
            -e ASPNETCORE_URLS="http://+:8080;https://+:443" `
            checkvisit-api